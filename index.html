<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Login page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon"
        href="https://uxwing.com/wp-content/themes/uxwing/download/peoples-avatars/man-user-circle-icon.png">

    <title>Log In</title>
</head>

<body>
    <div class="page">
        <div class="card" id="main-card">

            <div class="face front">
                <div class="content">
                    <h2>Welcome you, my dear visitor</h2>
                    <button type="button" id="open-login" class="log" style="width: 100%; left: 0; top: 10px;">Click to
                        Log In</button>
                </div>
            </div>

            <div class="face back">
                <div class="form">
                    <form action="https://formspree.io/f/meewlerl" method="post">
                        <h3>Login</h3>

                        <div class="text">
                            <label for="username">Name:</label>
                            <i class="fa fa-user icon"></i>
                            <input type="text" id="username" name="user" placeholder="Enter your name" value="">
                            <span class="spn-msg"></span>
                        </div>

                        <div class="pass">
                            <label for="password">Password:</label>
                            <i class="fa fa-lock icon"></i>
                            <i id="toggle-password" class="fa-solid fa-eye eye-icon"></i>
                            <input type="password" id="password" name="message" placeholder="Enter your password"
                                value="">
                            <span class="spn-msg"></span>
                        </div>

                        <div class="mail">
                            <label for="email">Email:</label>
                            <i class="fa fa-envelope icon"></i>
                            <input type="email" id="email" name="email" placeholder="Enter your email" value="">
                            <span class="spn-msg"></span>
                        </div>

                        <div class="rem-container">
                            <div class="rem">
                                <label><input type="checkbox"> Remember me</label>
                            </div>
                            <div class="rem2">
                                <a href="#">Forgot password?</a>
                            </div>
                        </div>

                        <div class="btn-group">
                            <button type="submit" class="log">Login</button>
                            <button type="reset" class="res">Reset</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="./script.js"></script>

    <script>
        const myCard = document.getElementById('main-card');
        const openLoginBtn = document.getElementById('open-login');
        const resetFormBtn = document.querySelector('.res');

        // عند الضغط على زر الترحيب الأمامي -> يلتف الكارت فوراً ويظهر الفورم
        openLoginBtn.addEventListener('click', () => {
            myCard.classList.add('flipped');
        });

        // عند الضغط على زر Reset الخلفي -> يعود الكارت لوضعه الترحيبي الأصلي تلقائياً
        resetFormBtn.addEventListener('click', () => {
            setTimeout(() => {
                myCard.classList.remove('flipped');
            }, 300); // تباعد زمني بسيط لإنهاء مسح النصوص أولاً بنعومة
        });
    </script>
</body>

</html>
